name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read mod id + version
        id: version
        run: |
          VERSION=$(grep -E '^mod_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          MOD_ID=$(grep -E '^mod_id=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          if [ -z "$VERSION" ]; then
            echo "mod_version not found in gradle.properties" >&2
            exit 1
          fi
          if [ -z "$MOD_ID" ]; then
            echo "mod_id not found in gradle.properties" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          # ForgeGradle output: build/libs/<archivesName>-<version>.jar, where archivesName = mod_id.
          echo "artifact=build/libs/${MOD_ID}-${VERSION}.jar" >> "$GITHUB_OUTPUT"

      - name: Check for existing release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.version.outputs.tag }} already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        if: steps.check.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon --stacktrace

      - name: Publish release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.version.outputs.artifact }}
